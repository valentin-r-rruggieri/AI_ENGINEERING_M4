      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC"/>
  <rect x="32" y="30" width="1216" height="660" rx="28" fill="white" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="640.0" y="82" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">AI Engineering: cadena de decisiones</text>
  <text x="640.0" y="120" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="500" fill="#475569">Cada bloque afecta calidad, costo y latencia</text>
  <rect x="120" y="270" width="170" height="80" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
<text x="205.0" y="314" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Texto</text>
<rect x="320" y="270" width="170" height="80" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
<text x="405.0" y="314" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Tokens</text>
<rect x="520" y="270" width="170" height="80" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
<text x="605.0" y="314" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Modelo</text>
<rect x="720" y="270" width="170" height="80" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
<text x="805.0" y="314" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Adaptacion</text>
<rect x="920" y="270" width="170" height="80" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
<text x="1005.0" y="314" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Medicion</text>
<line x1="290" y1="310" x2="320" y2="310" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="520" y1="310" x2="550" y2="310" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="750" y1="310" x2="780" y2="310" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="980" y1="310" x2="1010" y2="310" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="640" y="470" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="500" fill="#475569">La arquitectura no es solo elegir modelo.</text>
<text x="640" y="498" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="500" fill="#475569">Es justificar decisiones conectadas.</text>
