<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC"/>
  <rect x="32" y="30" width="1216" height="660" rx="28" fill="white" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="640.0" y="82" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">Costo de attention: N x N</text>
  <text x="640.0" y="120" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="500" fill="#475569">Mas tokens generan muchas mas relaciones</text>
  <rect x="130" y="230" width="230" height="90" rx="16" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
<text x="245" y="284" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800" fill="#111827">10 tokens</text>
<rect x="470" y="205" width="250" height="140" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
<text x="595" y="260" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#111827">100</text>
<text x="595" y="288" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#111827">relaciones</text>
<rect x="850" y="170" width="300" height="210" rx="16" fill="#FFE4E6" stroke="#E11D48" stroke-width="2"/>
<text x="1000" y="250" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#111827">100 tokens</text>
<text x="1000" y="278" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#111827">10.000 relaciones</text>
<line x1="360" y1="275" x2="470" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="720" y1="275" x2="850" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="640" y="500" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900" fill="#E11D48">Esto puede romper el SLA de 600 ms</text>
</svg>
